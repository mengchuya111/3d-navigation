<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>注册 - C5教学楼</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #1976D2, #1565C0);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(25, 118, 210, 0.4);
        }
        
        .login-logo svg {
            width: 50px;
            height: 50px;
            fill: white;
        }
        
        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 10px;
        }
        
        .login-subtitle {
            font-size: 14px;
            color: var(--text-hint);
            margin-bottom: 40px;
        }
        
        .login-form {
            width: 100%;
            max-width: 320px;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        
        .input-group {
            margin-bottom: 20px;
            position: relative;
        }
        
        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        
        .input-group input {
            width: 100%;
            height: 48px;
            padding: 0 16px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 15px;
            background: white;
            transition: all 0.3s ease;
        }
        
        .input-group input:focus {
            border-color: var(--tab-active);
            box-shadow: 0 0 0 4px rgba(25, 118, 210, 0.12);
            outline: none;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
        }
        
        .password-toggle svg {
            width: 18px;
            height: 18px;
            fill: #999;
            transition: all 0.2s ease;
        }
        
        .password-toggle:hover svg {
            fill: var(--tab-active);
        }
        
        .login-btn {
            width: 100%;
            height: 50px;
            background: linear-gradient(145deg, #4CAF50, #388E3C);
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4);
            margin-top: 10px;
        }
        
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.5);
        }
        
        .login-btn:active {
            transform: translateY(0);
        }
        
        .login-footer {
            margin-top: 30px;
            font-size: 14px;
            color: var(--text-hint);
            text-align: center;
        }
        
        .login-footer a {
            color: var(--tab-active);
            font-weight: 600;
            text-decoration: none;
        }
        
        .login-footer a:hover {
            text-decoration: underline;
        }
        
        .terms {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            margin: 20px 0;
        }
        
        .terms input[type="checkbox"] {
            margin-top: 3px;
            cursor: pointer;
            width: 16px;
            height: 16px;
        }
        
        .terms label {
            font-size: 12px;
            color: var(--text-hint);
            line-height: 1.5;
            margin: 0;
        }
        
        .terms a {
            color: var(--tab-active);
            text-decoration: none;
        }
        
        .terms a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: var(--danger-color);
            font-size: 12px;
            margin-top: 4px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .input-group input.error {
            border-color: var(--danger-color);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
        </div>
        
        <h1 class="login-title">创建账户</h1>
        <p class="login-subtitle">注册一个新账户开始使用导航</p>
        
        <form class="login-form" onsubmit="handleRegister(event)">
            <div class="input-group">
                <label>用户名</label>
                <input type="text" id="reg-username" placeholder="请输入用户名" required>
                <div class="error-message" id="username-error"></div>
            </div>
            
            <div class="input-group">
                <label>邮箱</label>
                <input type="email" id="reg-email" placeholder="请输入邮箱" required>
                <div class="error-message" id="email-error"></div>
            </div>
            
            <div class="input-group">
                <label>密码</label>
                <div class="input-wrapper">
                    <input type="password" id="reg-password" placeholder="请输入密码(至少6位)" minlength="6" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('reg-password')">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                    </button>
                </div>
                <div class="error-message" id="password-error"></div>
            </div>
            
            <div class="input-group">
                <label>确认密码</label>
                <div class="input-wrapper">
                    <input type="password" id="reg-confirm-password" placeholder="请再次输入密码" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('reg-confirm-password')">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>
                        </svg>
                    </button>
                </div>
                <div class="error-message" id="confirm-password-error"></div>
            </div>
            
            <div class="terms">
                <input type="checkbox" id="agree-terms" required>
                <label for="agree-terms">
                    我已阅读并同意 <a href="#" onclick="return false;">服务条款</a> 和 <a href="#" onclick="return false;">隐私政策</a>
                </label>
            </div>
            
            <button type="submit" class="login-btn">注册</button>
        </form>
        
        <p class="login-footer">
            已有账户? <a href="login.html">立即登录</a>
        </p>
    </div>

    <script src="data.js"></script>
    <script>
        // 密码可见性状态管理 - 独立维护每个输入框的状态
        const passwordVisibilityState = {};

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (!input) return;

            // 获取当前状态（默认为false，即不可见）
            const isCurrentlyVisible = passwordVisibilityState[inputId] || false;

            if (!isCurrentlyVisible) {
                // 当前隐藏，切换为显示
                input.type = 'text';
                passwordVisibilityState[inputId] = true;
            } else {
                // 当前显示，切换为隐藏
                input.type = 'password';
                passwordVisibilityState[inputId] = false;
            }
        }

        // 清除错误提示
        function clearError(fieldId) {
            const errorEl = document.getElementById(fieldId + '-error');
            const inputEl = document.getElementById(fieldId);
            if (errorEl) {
                errorEl.classList.remove('show');
                errorEl.textContent = '';
            }
            if (inputEl) {
                inputEl.classList.remove('error');
            }
        }

        // 显示错误提示
        function showError(fieldId, message) {
            const errorEl = document.getElementById(fieldId + '-error');
            const inputEl = document.getElementById(fieldId);
            if (errorEl) {
                errorEl.textContent = message;
                errorEl.classList.add('show');
            }
            if (inputEl) {
                inputEl.classList.add('error');
            }
        }

        // 验证邮箱格式
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(email);
        }

        function handleRegister(event) {
            event.preventDefault();
            
            const username = document.getElementById('reg-username').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirmPassword = document.getElementById('reg-confirm-password').value;
            const agreeTerms = document.getElementById('agree-terms').checked;
            
            // 清除所有错误提示
            clearError('username');
            clearError('email');
            clearError('password');
            clearError('confirm-password');
            
            let hasError = false;

            // 验证用户名
            if (!username) {
                showError('username', '请输入用户名');
                hasError = true;
            } else if (username.length < 2) {
                showError('username', '用户名至少2个字符');
                hasError = true;
            }

            // 验证邮箱
            if (!email) {
                showError('email', '请输入邮箱');
                hasError = true;
            } else if (!validateEmail(email)) {
                showError('email', '请输入有效的邮箱地址');
                hasError = true;
            }

            // 验证密码
            if (!password) {
                showError('password', '请输入密码');
                hasError = true;
            } else if (password.length < 6) {
                showError('password', '密码至少6个字符');
                hasError = true;
            }

            // 验证确认密码
            if (!confirmPassword) {
                showError('confirm-password', '请确认密码');
                hasError = true;
            } else if (password !== confirmPassword) {
                showError('confirm-password', '两次输入的密码不一致');
                hasError = true;
            }

            // 验证协议
            if (!agreeTerms) {
                alert('请先同意服务条款和隐私政策！');
                hasError = true;
            }

            if (hasError) {
                return;
            }
            
            // 检查用户是否已存在
            if (localStorage.getItem('user_' + username)) {
                showError('username', '该用户名已被注册');
                return;
            }

            // 保存用户信息
            try {
                localStorage.setItem('user_' + username, JSON.stringify({
                    username: username,
                    email: email,
                    password: password,
                    createdAt: new Date().toISOString()
                }));
                
                alert('注册成功！正在跳转到登录页面...');
                window.location.href = 'login.html';
            } catch (e) {
                alert('注册失败，请稍后重试');
                console.error('localStorage error:', e);
            }
        }

        // 实时清除错误提示
        document.getElementById('reg-username').addEventListener('input', function() {
            if (this.value.trim()) {
                clearError('username');
            }
        });

        document.getElementById('reg-email').addEventListener('input', function() {
            if (this.value.trim()) {
                clearError('email');
            }
        });

        document.getElementById('reg-password').addEventListener('input', function() {
            if (this.value) {
                clearError('password');
            }
        });

        document.getElementById('reg-confirm-password').addEventListener('input', function() {
            if (this.value) {
                clearError('confirm-password');
            }
        });
    </script>
</body>
</html>
